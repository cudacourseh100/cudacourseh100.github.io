name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Course Slides Source
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/cudacourseh100/H100-Course.git H100-Course
          git -C H100-Course sparse-checkout set slides

      - name: Fetch fast.cu Source
        run: |
          mkdir -p files
          git clone --depth 1 --filter=blob:none --sparse https://github.com/pranjalssh/fast.cu files/fast.cu
          git -C files/fast.cu sparse-checkout set examples/matmul

      - name: Build GitHub Pages bundle
        run: node scripts/build-pages.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
